<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Mood-Based Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-background"></div>
    <div class="album-tint" id="albumTint"></div>

    <main class="container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="title">Aura</h1>
            <p class="subtitle">AI Mood-Based Music Recommender 🎧</p>
        </header>

        <!-- Cover Flow — shown always, empty state before first search -->
        <section class="coverflow-section" id="resultSection">
            <div class="mood-header" id="moodHeader" style="opacity:0">
                <h2>Your Vibe: <span id="detectedMood" class="gradient-text"></span> <span id="bpmBadge"
                        class="bpm-badge" style="display:none"></span></h2>
            </div>
            <div class="coverflow-container" id="coverflow">
                <!-- Empty state before search -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🎵</div>
                    <p>Describe your mood to get started</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Bar: Prompt + Player side by side -->
    <div class="bottom-bar" id="bottomBar">
        <!-- Mood Input Pill -->
        <div class="mood-pill" id="moodPill">
            <svg class="mood-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" opacity="0.6">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
            </svg>
            <input type="text" id="moodInput" placeholder="How are you feeling?" autocomplete="off" />
            <span class="typing-cpm" id="typingStats"></span>
            <button id="predictBtn" class="mood-submit-btn" title="Find your vibe">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                </svg>
            </button>
            <div class="pill-spinner hidden" id="loadingIndicator">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Player Pill -->
        <div class="bottom-player hidden" id="bottomPlayer">
            <!-- Left: Transport Controls -->
            <div class="player-controls-left">
                <button class="icon-btn" id="prevBtn" title="Previous">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
                    </svg>
                </button>
                <button class="icon-btn play-btn" id="playPauseBtn" title="Play/Pause">
                    <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
                        style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
                <button class="icon-btn" id="nextBtn" title="Next">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
                    </svg>
                </button>
            </div>

            <!-- Center: Art + Info + Progress -->
            <div class="player-center">
                <img src="" alt="" class="player-art" id="playerArt">
                <div class="player-text-block">
                    <div class="player-title" id="playerTitle">—</div>
                    <div class="player-artist" id="playerArtist">—</div>
                    <div class="player-progress-bar">
                        <div class="player-progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <!-- Right: Extra Controls -->
            <div class="player-controls-right">
                <button class="icon-btn" id="openSpotifyBtn" title="Preview available" style="display:none">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1DB954">
                        <path
                            d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 01-.277-1.215c3.809-.87 7.077-.496 9.712 1.115a.622.622 0 01.207.857zm1.223-2.722a.779.779 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.779.779 0 01.519-.972c3.632-1.102 8.147-.568 11.234 1.328a.779.779 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.935.935 0 11-.543-1.79c3.532-1.072 9.404-.865 13.115 1.338a.935.935 0 01-.955 1.609z" />
                    </svg>
                </button>
                <button class="icon-btn" title="Volume">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="app.js"></script>
</body>

</html>
